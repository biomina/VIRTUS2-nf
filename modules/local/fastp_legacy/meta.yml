name: fastp_legacy
description: |
  Adapter and quality trimming with fastp 0.20.0 for legacy CWL-equivalent mode.
  Mirrors the nf-core/fastp module but omits the --detect_adapter_for_pe flag
  in the paired-end branch, matching the original CWL VIRTUS2 invocation that
  relies on overlap-based PE adapter detection only.
  Used exclusively when params.tool_versions == 'legacy'.
keywords:
  - trimming
  - quality control
  - fastq
  - adapter
  - legacy
tools:
  - fastp:
      description: |
        A tool designed to provide fast all-in-one preprocessing for FastQ files.
        This tool is developed in C++ with multithreading supported to afford
        high performance.
      homepage: https://github.com/OpenGene/fastp
      documentation: https://github.com/OpenGene/fastp
      doi: 10.1093/bioinformatics/bty560
      licence: ["MIT"]
      identifier: biotools:fastp

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information. Use 'single_end: true' to
          specify single-end or interleaved FASTQs. Use 'single_end: false' for
          paired-end reads.
          e.g. [ id:'test', single_end:false ]
    - reads:
        description: |
          List of input FastQ files of size 1 and 2 for single-end and
          paired-end data respectively.
        ontologies:
          - edam: http://edamontology.org/format_1930 # FASTQ
    - adapter_fasta:
        description: Optional FASTA file of adapter sequences to remove.
        pattern: "*.{fasta,fna,fas,fa}"
        ontologies: []
  - discard_trimmed_pass:
      type: boolean
      description: |
        Specify true to not write any reads that pass trimming thresholds.
  - save_trimmed_fail:
      type: boolean
      description: Specify true to save reads that failed trimming thresholds.
  - save_merged:
      type: boolean
      description: Specify true to save merged paired reads.

output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.fastp.fastq.gz":
          description: Trimmed/modified FASTQ reads.
          pattern: "*.fastp.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
            - edam: http://edamontology.org/format_3989 # GZIP format
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.json":
          description: fastp QC report in JSON format.
          pattern: "*.json"
          ontologies:
            - edam: http://edamontology.org/format_3464 # JSON
  html:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.html":
          description: fastp QC report in HTML format.
          pattern: "*.html"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.log":
          description: fastp log (stderr) file.
          pattern: "*.log"
          ontologies: []
  reads_fail:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.fail.fastq.gz":
          description: Reads that failed trimming thresholds (optional).
          pattern: "*.fail.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
            - edam: http://edamontology.org/format_3989 # GZIP format
  reads_merged:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "*.merged.fastq.gz":
          description: Merged paired reads (optional, PE only).
          pattern: "*.merged.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_1930 # FASTQ
            - edam: http://edamontology.org/format_3989 # GZIP format
  versions:
    - versions:
        type: channel
        description: Channel emitting software version information via the Nextflow `versions` topic.

authors:
  - "@biomina"
maintainers:
  - "@biomina"
