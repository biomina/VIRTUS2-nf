name: bam_filter_polyx
description: |
  Remove poly-X reads (poly-A, poly-T, poly-TG) from a viral BAM file using
  the bam_filter_polyx.sh script bundled in the yyasumizu/bam_filter_polyx
  Docker image. Reads containing runs of homopolymer or dinucleotide repeats
  are discarded to reduce artefacts in downstream viral quantification.
keywords:
  - bam
  - filter
  - poly-X
  - samtools
  - viral
tools:
  - samtools:
      description: Tools for manipulating alignments in the SAM format.
      homepage: https://www.htslib.org/
      documentation: https://www.htslib.org/doc/samtools.html
      doi: 10.1093/gigascience/giab008
      licence: ["MIT"]
      identifier: biotools:samtools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information.
          e.g. [ id:'test', single_end:false ]
    - bam:
        description: Input BAM file (viral alignment, coordinate-sorted).
        pattern: "*.bam"
        ontologies: []

output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'test', single_end:false ]
      - "virusAligned.filtered.sortedByCoord.out.bam":
          description: Poly-X filtered BAM file.
          pattern: "virusAligned.filtered.sortedByCoord.out.bam"
          ontologies: []
  versions:
    - versions:
        type: channel
        description: Channel emitting software version information via the Nextflow `versions` topic.

authors:
  - "@biomina"
maintainers:
  - "@biomina"
